<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktive Deklinationstabelle: Korrigiert</title>
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --border-color: #dee2e6;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1, h2 { text-align: center; color: var(--primary-color); margin-bottom: 10px; }

        .instruction-box {
            background: #eef7fd;
            padding: 15px;
            border-left: 6px solid var(--secondary-color);
            margin-bottom: 25px;
            border-radius: 8px;
        }

        .table-wrapper {
            overflow-x: auto;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
            background-color: white;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 12px 8px;
            text-align: center;
        }

        th {
            background-color: #f1f3f5;
            font-weight: bold;
        }

        .case-label {
            background-color: #f1f3f5;
            font-weight: bold;
            text-align: left;
            padding-left: 15px;
            width: 140px;
        }

        select {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 2px solid #ced4da;
            background-color: #fff;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.2s;
        }

        select.correct {
            border-color: var(--success-color) !important;
            background-color: #d4edda !important;
            color: #155724 !important;
        }

        select.incorrect {
            border-color: var(--error-color) !important;
            background-color: #f8d7da !important;
            color: #721c24 !important;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-reset { background: #95a5a6; color: white; }
        .btn-solution { background: var(--secondary-color); color: white; }

        @media (max-width: 600px) {
            .container { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Russisch Arbeitsblatt</h1>
    <h2>Deklinationstabelle: мамин</h2>

    <div class="instruction-box">
        <strong>Aufgabe:</strong> Deklinieren Sie das Wort <strong>мамин</strong> korrekt. 
        Wählen Sie die Form aus dem Dropdown. <br>
        Besonderes Augenmerk: <strong>Akkusativ Feminin</strong> (Endung -у!).
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Fall</th>
                    <th>Maskulin</th>
                    <th>Feminin</th>
                    <th>Neutrum</th>
                    <th>Plural</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- Wird durch JS befüllt -->
            </tbody>
        </table>
    </div>

    <div class="controls">
        <button class="btn-reset" onclick="resetTable()">Tabelle leeren</button>
        <button class="btn-solution" onclick="showAllSolutions()">Lösungen anzeigen</button>
    </div>
</div>

<script>
// Exakt 4 Zellen pro Reihe (Masc, Fem, Neut, Plur)
const tableData = [
    {
        case: "Nominativ",
        cells: [
            { correct: "мамин", opts: ["мамин", "мамина", "мамино"] },
            { correct: "мамина", opts: ["мамина", "мамину", "маминой"] },
            { correct: "мамино", opts: ["мамино", "мамин", "мамина"] },
            { correct: "мамины", opts: ["мамины", "маминых", "мамином"] }
        ]
    },
    {
        case: "Genitiv",
        cells: [
            { correct: "маминого", opts: ["маминого", "маминым", "мамина"] },
            { correct: "маминой", opts: ["маминой", "мамину", "мамином"] },
            { correct: "маминого", opts: ["маминого", "мамина", "маминым"] },
            { correct: "маминых", opts: ["маминых", "мамиными", "маминым"] }
        ]
    },
    {
        case: "Dativ",
        cells: [
            { correct: "маминому", opts: ["маминому", "маминым", "мамине"] },
            { correct: "маминой", opts: ["маминой", "мамину", "мамине"] },
            { correct: "маминому", opts: ["маминому", "мамином", "маминым"] },
            { correct: "маминым", opts: ["маминым", "маминых", "мамиными"] }
        ]
    },
    {
        case: "Akkusativ",
        cells: [
            { correct: "мамин", opts: ["мамин", "маминого", "маминым"] },
            { correct: "мамину", opts: ["мамину", "маминую", "маминой"] },
            { correct: "мамино", opts: ["мамино", "мамина", "маминому"] },
            { correct: "мамины", opts: ["мамины", "маминых", "мамиными"] }
        ]
    },
    {
        case: "Instrumental",
        cells: [
            { correct: "маминым", opts: ["маминым", "мамином", "маминого"] },
            { correct: "маминой", opts: ["маминой", "мамину", "маминою"] },
            { correct: "маминым", opts: ["маминым", "мамино", "мамином"] },
            { correct: "мамиными", opts: ["мамиными", "маминым", "маминых"] }
        ]
    },
    {
        case: "Präpositiv",
        cells: [
            { correct: "мамином", opts: ["мамином", "мамине", "маминым"] },
            { correct: "маминой", opts: ["маминой", "мамину", "мамине"] },
            { correct: "мамином", opts: ["мамином", "мамине", "мамино"] },
            { correct: "маминых", opts: ["маминых", "маминым", "мамиными"] }
        ]
    }
];

function shuffle(arr) {
    return arr.sort(() => Math.random() - 0.5);
}

function render() {
    const body = document.getElementById('table-body');
    body.innerHTML = '';

    tableData.forEach((row, rIdx) => {
        const tr = document.createElement('tr');
        
        const tdCase = document.createElement('td');
        tdCase.className = 'case-label';
        tdCase.innerText = row.case;
        tr.appendChild(tdCase);

        row.cells.forEach((cell, cIdx) => {
            const td = document.createElement('td');
            const sel = document.createElement('select');
            sel.id = `cell-${rIdx}-${cIdx}`;
            
            const def = document.createElement('option');
            def.value = "";
            def.innerText = "-- ? --";
            sel.appendChild(def);

            shuffle([...cell.opts]).forEach(o => {
                const opt = document.createElement('option');
                opt.value = o;
                opt.innerText = o;
                sel.appendChild(opt);
            });

            sel.onchange = (e) => {
                if (e.target.value === "") {
                    sel.className = "";
                } else if (e.target.value === cell.correct) {
                    sel.className = "correct";
                } else {
                    sel.className = "incorrect";
                }
            };

            td.appendChild(sel);
            tr.appendChild(td);
        });
        body.appendChild(tr);
    });
}

// Korrigierte Reset-Funktion: Greift direkt alle Selects in der Tabelle ab
function resetTable() {
    const allSelects = document.querySelectorAll('#table-body select');
    allSelects.forEach(sel => {
        sel.value = "";
        sel.className = "";
    });
}

function showAllSolutions() {
    tableData.forEach((row, rIdx) => {
        row.cells.forEach((cell, cIdx) => {
            const sel = document.getElementById(`cell-${rIdx}-${cIdx}`);
            if (sel) {
                sel.value = cell.correct;
                sel.className = "correct";
            }
        });
    });
}

window.onload = render;
</script>

</body>
</html>
