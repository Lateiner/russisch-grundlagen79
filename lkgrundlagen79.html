<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vokabel-Trainer: Russische Possessivadjektive</title>
    <style>
        :root {
            --primary-green: #27ae60;
            --secondary-green: #2ecc71;
            --dark-green: #1e8449;
            --light-bg: #e8f5e9;
            --card-shadow: rgba(0, 0, 0, 0.15);
            --text-color: #2c3e50;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--dark-green);
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        /* Fortschrittsanzeige */
        .progress {
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--dark-green);
            background: white;
            padding: 5px 15px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* Karteikarten Bereich */
        .flashcard-container {
            perspective: 1000px;
            width: 100%;
            height: 300px;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 10px 25px var(--card-shadow);
            border-radius: 15px;
        }

        .flashcard-container.is-flipped .flashcard-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-radius: 15px;
            background: white;
            border: 2px solid var(--secondary-green);
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #f9fdf9;
        }

        .word-text {
            font-size: 2rem;
            font-weight: bold;
            word-wrap: break-word;
            max-width: 100%;
            text-align: center;
        }

        .note {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-top: 15px;
            font-style: italic;
        }

        /* Bedienungselemente */
        .main-controls {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
            margin-bottom: 20px;
        }

        .secondary-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background-color: var(--primary-green);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        button:hover {
            background-color: var(--dark-green);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-nav {
            min-width: 120px;
        }

        .btn-utility {
            background-color: white;
            color: var(--dark-green);
            border: 2px solid var(--primary-green);
        }

        .btn-utility:hover {
            background-color: var(--light-bg);
            color: var(--dark-green);
        }

        /* Tastatur-Hinweis */
        .keyboard-hint {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #95a5a6;
            text-align: center;
        }

        @media (max-width: 480px) {
            .flashcard-container { height: 250px; }
            .word-text { font-size: 1.5rem; }
            .main-controls { flex-direction: row; }
            button { padding: 10px 15px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Lernkartei: Possessivadjektive</h1>

    <div class="progress" id="progress-indicator">1 / 43</div>

    <div class="flashcard-container" id="card-container" onclick="flipCard()">
        <div class="flashcard-inner">
            <div class="card-face card-front">
                <div class="word-text" id="front-text">Vorderseite</div>
                <div class="note" id="front-note"></div>
            </div>
            <div class="card-face card-back">
                <div class="word-text" id="back-text">Rückseite</div>
                <div class="note" id="back-note"></div>
            </div>
        </div>
    </div>

    <div class="main-controls">
        <button class="btn-nav" onclick="prevCard(event)">← Vorherige</button>
        <button class="btn-nav" onclick="nextCard(event)">Nächste →</button>
    </div>

    <div class="secondary-controls">
        <button class="btn-utility" onclick="shuffleCards()">🔀 Mischen</button>
        <button class="btn-utility" onclick="resetToStart()">🏠 An den Anfang</button>
    </div>

    <div class="keyboard-hint">
        Tastatur: Pfeiltasten für Navigation | Leertaste/Enter zum Umdrehen | Pos1 für Anfang
    </div>
</div>

<script>
    // Rohdaten der Vokabelliste
    const vocabRaw = [
        "ма́ма \t Mutter", "па́па \t Vater", "сестра́ \t Schwester", "ба́бушка \t Großmutter",
        "де́душка \t Großvater", "тётя \t Tante", "дя́дя \t Onkel", "Са́ша \t Sascha",
        "Ва́ня \t Wanja", "лиси́ца \t Füchsin", "ку́рица \t Huhn", "су́мка \t Tasche",
        "телефо́н \t Telefon", "пла́тье \t Kleid", "очки́ \t Brille", "кни́га \t Buch",
        "тетра́дь \t Heft", "каранда́ш \t Bleistift", "фо́то \t Foto", "газе́та \t Zeitung",
        "журна́л \t Zeitschrift", "дом \t Haus", "ко́мната \t Zimmer", "маши́на \t Auto",
        "пода́рок \t Geschenk", "ви́деть / уви́деть \t sehen", "чита́ть / прочита́ть \t lesen",
        "говори́ть / сказа́ть \t sprechen / sagen", "идти́ / пойти́ \t gehen", "помога́ть / помо́чь \t helfen",
        "брать / взять \t nehmen", "люби́ть / полюби́ть \t lieben", "сиде́ть / посиде́ть \t sitzen",
        "игра́ть / поигра́ть \t spielen", "подходи́ть / подойти́ \t herantreten / hingehen",
        "расска́зывать / рассказа́ть \t erzählen", "иска́ть / поиска́ть \t suchen",
        "склоня́ть / просклоня́ть \t deklinieren", "зна́ть / узна́ть \t wissen / erfahren",
        "жить / прожи́ть \t leben", "Пу́шкин \t Puschkin", "Ку́рицын \t Kurizyn", "Ку́рицыно \t Kurizyno"
    ];

    let cards = [];
    let currentIndex = 0;

    // Initialisierung: Daten parsen
    function initDeck() {
        cards = vocabRaw.map(line => {
            const parts = line.split('\t');
            return {
                front: parts[0] ? parts[0].trim() : "",
                back: parts[1] ? parts[1].trim() : "",
                frontNote: parts[2] ? parts[2].trim() : "",
                backNote: parts[3] ? parts[3].trim() : ""
            };
        });
        updateDisplay();
    }

    function updateDisplay() {
        const card = cards[currentIndex];
        const frontTextEl = document.getElementById('front-text');
        const backTextEl = document.getElementById('back-text');
        
        // Texte setzen
        frontTextEl.innerText = card.front;
        backTextEl.innerText = card.back;
        document.getElementById('front-note').innerText = card.frontNote;
        document.getElementById('back-note').innerText = card.backNote;

        // Schriftgröße dynamisch anpassen
        adjustFontSize(frontTextEl);
        adjustFontSize(backTextEl);

        // Fortschritt
        document.getElementById('progress-indicator').innerText = `${currentIndex + 1} / ${cards.length}`;
        
        // Karte immer auf Vorderseite zurücksetzen bei Navigation
        document.getElementById('card-container').classList.remove('is-flipped');
    }

    function adjustFontSize(el) {
        const len = el.innerText.length;
        if (len > 25) {
            el.style.fontSize = "1.2rem";
        } else if (len > 15) {
            el.style.fontSize = "1.6rem";
        } else {
            el.style.fontSize = "2rem";
        }
    }

    function flipCard() {
        document.getElementById('card-container').classList.toggle('is-flipped');
    }

    function nextCard(event) {
        if (event) event.stopPropagation();
        if (currentIndex < cards.length - 1) {
            currentIndex++;
            updateDisplay();
        }
    }

    function prevCard(event) {
        if (event) event.stopPropagation();
        if (currentIndex > 0) {
            currentIndex--;
            updateDisplay();
        }
    }

    function shuffleCards() {
        for (let i = cards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cards[i], cards[j]] = [cards[j], cards[i]];
        }
        currentIndex = 0;
        updateDisplay();
    }

    function resetToStart() {
        currentIndex = 0;
        updateDisplay();
    }

    // Tastatursteuerung
    document.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Enter') {
            e.preventDefault();
            flipCard();
        } else if (e.key === 'ArrowRight') {
            nextCard();
        } else if (e.key === 'ArrowLeft') {
            prevCard();
        } else if (e.key === 'Home') {
            resetToStart();
        }
    });

    // Start
    initDeck();
</script>

</body>
</html>
