<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Sorting: Sofort-Feedback</title>
    <!-- Polyfill für Drag & Drop auf Touch-Geräten -->
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1, h2 { text-align: center; margin-bottom: 10px; }

        .instruction-box {
            background: #eef7fd;
            padding: 15px;
            border-left: 5px solid var(--secondary-color);
            margin-bottom: 25px;
            border-radius: 8px;
            font-size: 0.95em;
        }

        /* Wort-Pool */
        .item-pool {
            background: #fff;
            border: 2px solid #d1d9e0;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            min-height: 80px;
        }

        .draggable-item {
            padding: 8px 15px;
            background-color: var(--primary-color);
            color: white;
            border-radius: 6px;
            cursor: grab;
            user-select: none;
            font-size: 0.95em;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: background-color 0.3s, transform 0.2s;
        }

        /* Körbe */
        .bins-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .bin {
            background: #ffffff;
            border: 2px dashed #cbd5e0;
            border-radius: 12px;
            padding: 15px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s;
        }

        .bin.drag-over {
            background-color: #e2e8f0;
            border-color: var(--secondary-color);
        }

        .bin h3 {
            margin-top: 0;
            font-size: 1em;
            color: var(--secondary-color);
            text-align: center;
            border-bottom: 2px solid #eee;
            width: 100%;
            padding-bottom: 8px;
            pointer-events: none;
        }

        .bin-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            min-height: 200px;
        }

        /* Feedback Styles */
        .correct-item { background-color: var(--success-color) !important; }
        .incorrect-item { background-color: var(--error-color) !important; }

        /* Buttons */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-reset { background-color: #95a5a6; color: white; }
        .btn-solution { background-color: var(--secondary-color); color: white; }

        @media (max-width: 768px) {
            .bins-container { grid-template-columns: 1fr; }
            .bin { min-height: 150px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Russisch Arbeitsblatt</h1>
    <h2>Kategorisierung: Kasus-Sorting</h2>

    <div class="instruction-box">
        <strong>Aufgabe:</strong> Ziehen Sie die Wörter in den richtigen Korb. 
        Das Feedback erfolgt <strong>sofort beim Loslassen</strong>:
        <span style="color:var(--success-color); font-weight:bold;">Grün = Richtig</span>, 
        <span style="color:var(--error-color); font-weight:bold;">Rot = Falsch</span>.
    </div>

    <h3>Wörter-Pool</h3>
    <div class="item-pool" id="pool" ondrop="drop(event)" ondragover="allowDrop(event)"></div>

    <div class="bins-container">
        <div class="bin" id="akkusativ" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h3>AKKUSATIV (-у)</h3>
            <div class="bin-content" id="content-akkusativ"></div>
        </div>
        <div class="bin" id="instrumental" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h3>INSTRUMENTAL (-ым)</h3>
            <div class="bin-content" id="content-instrumental"></div>
        </div>
        <div class="bin" id="praepositiv" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h3>PRÄPOSITIV (-ом / -е)</h3>
            <div class="bin-content" id="content-praepositiv"></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-reset" onclick="resetAll()">Zurücksetzen</button>
        <button class="btn-solution" onclick="showSolution()">Lösungen anzeigen</button>
    </div>
</div>

<script>
const itemsData = [
    { id: 1, text: "мамину", case: "akkusativ" },
    { id: 2, text: "папину", case: "akkusativ" },
    { id: 3, text: "сестрину", case: "akkusativ" },
    { id: 4, text: "бабушкину", case: "akkusativ" },
    { id: 5, text: "Сашину", case: "akkusativ" },
    { id: 6, text: "Курицыну", case: "akkusativ" },
    { id: 7, text: "маминым", case: "instrumental" },
    { id: 8, text: "папиным", case: "instrumental" },
    { id: 9, text: "сестриным", case: "instrumental" },
    { id: 10, text: "дедушкиным", case: "instrumental" },
    { id: 11, text: "Пушкиным", case: "instrumental" },
    { id: 12, text: "Курицыным", case: "instrumental" },
    { id: 13, text: "Сашиным", case: "instrumental" },
    { id: 14, text: "мамином", case: "praepositiv" },
    { id: 15, text: "папином", case: "praepositiv" },
    { id: 16, text: "сестрином", case: "praepositiv" },
    { id: 17, text: "Пушкине", case: "praepositiv" },
    { id: 18, text: "Курицыне", case: "praepositiv" },
    { id: 19, text: "бабушкином", case: "praepositiv" },
    { id: 20, text: "дедушкином", case: "praepositiv" }
];

function init() {
    const pool = document.getElementById('pool');
    pool.innerHTML = '';
    const shuffled = [...itemsData].sort(() => Math.random() - 0.5);
    
    shuffled.forEach(item => {
        const el = document.createElement('div');
        el.className = 'draggable-item';
        el.id = 'item-' + item.id;
        el.draggable = true;
        el.innerText = item.text;
        el.setAttribute('data-case', item.case);
        el.ondragstart = drag;
        pool.appendChild(el);
    });
}

function allowDrop(ev) {
    ev.preventDefault();
    let target = ev.target;
    while (target && !target.classList.contains('bin') && target.id !== 'pool') {
        target = target.parentNode;
    }
    if (target && target.classList.contains('bin')) {
        target.classList.add('drag-over');
    }
}

// Dragleave um Highlight zu entfernen
document.addEventListener('dragleave', function(ev) {
    if (ev.target.classList.contains('bin')) {
        ev.target.classList.remove('drag-over');
    }
});

function drag(ev) {
    ev.dataTransfer.setData("textId", ev.target.id);
}

function drop(ev) {
    ev.preventDefault();
    const id = ev.dataTransfer.getData("textId");
    const el = document.getElementById(id);
    let target = ev.target;

    // Finde das korrekte Ziel-Element (Bin oder Pool)
    while (target && !target.classList.contains('bin') && target.id !== 'pool') {
        target = target.parentNode;
    }

    if (!target) return;

    if (target.classList.contains('bin')) {
        target.classList.remove('drag-over');
        target.querySelector('.bin-content').appendChild(el);
        
        // DIREKTES FEEDBACK
        const correctCase = el.getAttribute('data-case');
        if (correctCase === target.id) {
            el.classList.add('correct-item');
            el.classList.remove('incorrect-item');
        } else {
            el.classList.add('incorrect-item');
            el.classList.remove('correct-item');
        }
    } else if (target.id === 'pool') {
        target.appendChild(el);
        // Feedback entfernen, wenn zurück im Pool
        el.classList.remove('correct-item', 'incorrect-item');
    }
}

function resetAll() {
    document.getElementById('content-akkusativ').innerHTML = '';
    document.getElementById('content-instrumental').innerHTML = '';
    document.getElementById('content-praepositiv').innerHTML = '';
    init();
}

function showSolution() {
    itemsData.forEach(item => {
        const el = document.getElementById('item-' + item.id);
        const binContent = document.getElementById('content-' + item.case);
        binContent.appendChild(el);
        el.classList.add('correct-item');
        el.classList.remove('incorrect-item');
    });
}

window.onload = init;
</script>

</body>
</html>
